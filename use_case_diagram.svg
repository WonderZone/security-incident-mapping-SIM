<svg xmlns="http://www.w3.org/2000/svg" width="960" height="660" viewBox="0 0 960 660" font-family="Helvetica, Arial, sans-serif">
  <rect width="960" height="660" fill="white"/>

  <!-- Title -->
  <text x="480" y="28" text-anchor="middle" font-size="20" font-weight="bold">Use-Case Diagram — SIM (Security Incident Mapping)</text>

  <!-- System boundary -->
  <rect x="200" y="55" width="560" height="565" fill="none" stroke="#333" stroke-width="2"/>
  <text x="480" y="78" text-anchor="middle" font-size="15" font-weight="bold">SIM System</text>

  <!-- ===== Actor: Student/Villa Mate ===== -->
  <g id="student">
    <circle cx="60" cy="140" r="12" fill="none" stroke="#000" stroke-width="2"/>
    <line x1="60" y1="152" x2="60" y2="195" stroke="#000" stroke-width="2"/>
    <line x1="30" y1="170" x2="90" y2="170" stroke="#000" stroke-width="2"/>
    <line x1="60" y1="195" x2="35" y2="230" stroke="#000" stroke-width="2"/>
    <line x1="60" y1="195" x2="85" y2="230" stroke="#000" stroke-width="2"/>
    <text x="60" y="248" text-anchor="middle" font-size="13">Student /</text>
    <text x="60" y="263" text-anchor="middle" font-size="13">Villa Mate</text>
  </g>

  <!-- ===== Actor: Staff ===== -->
  <g id="staff">
    <circle cx="60" cy="330" r="12" fill="none" stroke="#000" stroke-width="2"/>
    <line x1="60" y1="342" x2="60" y2="385" stroke="#000" stroke-width="2"/>
    <line x1="30" y1="360" x2="90" y2="360" stroke="#000" stroke-width="2"/>
    <line x1="60" y1="385" x2="35" y2="420" stroke="#000" stroke-width="2"/>
    <line x1="60" y1="385" x2="85" y2="420" stroke="#000" stroke-width="2"/>
    <text x="60" y="438" text-anchor="middle" font-size="13">Staff</text>
  </g>

  <!-- ===== Actor: Landlord ===== -->
  <g id="landlord">
    <circle cx="60" cy="500" r="12" fill="none" stroke="#000" stroke-width="2"/>
    <line x1="60" y1="512" x2="60" y2="555" stroke="#000" stroke-width="2"/>
    <line x1="30" y1="530" x2="90" y2="530" stroke="#000" stroke-width="2"/>
    <line x1="60" y1="555" x2="35" y2="590" stroke="#000" stroke-width="2"/>
    <line x1="60" y1="555" x2="85" y2="590" stroke="#000" stroke-width="2"/>
    <text x="60" y="608" text-anchor="middle" font-size="13">Landlord</text>
  </g>

  <!-- ===== Actor: Admin / Security Officer ===== -->
  <g id="admin">
    <circle cx="890" cy="330" r="12" fill="none" stroke="#000" stroke-width="2"/>
    <line x1="890" y1="342" x2="890" y2="385" stroke="#000" stroke-width="2"/>
    <line x1="860" y1="360" x2="920" y2="360" stroke="#000" stroke-width="2"/>
    <line x1="890" y1="385" x2="865" y2="420" stroke="#000" stroke-width="2"/>
    <line x1="890" y1="385" x2="915" y2="420" stroke="#000" stroke-width="2"/>
    <text x="890" y="438" text-anchor="middle" font-size="13">Admin /</text>
    <text x="890" y="453" text-anchor="middle" font-size="13">Security Officer</text>
  </g>

  <!-- ===== Use case ellipses ===== -->
  <ellipse cx="380" cy="120" rx="110" ry="30" fill="#eaf1fb" stroke="#333" stroke-width="1.5"/>
  <text x="380" y="125" text-anchor="middle" font-size="13">Register / Login</text>

  <ellipse cx="380" cy="215" rx="120" ry="32" fill="#eaf1fb" stroke="#333" stroke-width="1.5"/>
  <text x="380" y="212" text-anchor="middle" font-size="13">Submit Incident</text>
  <text x="380" y="228" text-anchor="middle" font-size="13">Report</text>

  <ellipse cx="620" cy="270" rx="110" ry="30" fill="#f5eaea" stroke="#333" stroke-width="1.5"/>
  <text x="620" y="275" text-anchor="middle" font-size="13">Report Anonymously</text>

  <ellipse cx="380" cy="330" rx="130" ry="32" fill="#eaf1fb" stroke="#333" stroke-width="1.5"/>
  <text x="380" y="327" text-anchor="middle" font-size="13">View / Filter</text>
  <text x="380" y="343" text-anchor="middle" font-size="13">Incident List</text>

  <ellipse cx="480" cy="440" rx="150" ry="32" fill="#eaf6ea" stroke="#333" stroke-width="1.5"/>
  <text x="480" y="437" text-anchor="middle" font-size="13">Review &amp; Update</text>
  <text x="480" y="453" text-anchor="middle" font-size="13">Report Status</text>

  <ellipse cx="480" cy="540" rx="130" ry="32" fill="#eaf6ea" stroke="#333" stroke-width="1.5"/>
  <text x="480" y="537" text-anchor="middle" font-size="13">View Incident</text>
  <text x="480" y="553" text-anchor="middle" font-size="13">Analytics</text>

  <!-- ===== Associations: reporters ===== -->
  <line x1="92" y1="150" x2="270" y2="130" stroke="#555" stroke-width="1.3"/>
  <line x1="92" y1="165" x2="260" y2="215" stroke="#555" stroke-width="1.3"/>
  <line x1="92" y1="185" x2="250" y2="325" stroke="#555" stroke-width="1.3"/>

  <line x1="92" y1="340" x2="270" y2="140" stroke="#555" stroke-width="1.3"/>
  <line x1="92" y1="355" x2="260" y2="220" stroke="#555" stroke-width="1.3"/>
  <line x1="92" y1="365" x2="250" y2="330" stroke="#555" stroke-width="1.3"/>

  <line x1="92" y1="510" x2="270" y2="145" stroke="#555" stroke-width="1.3"/>
  <line x1="92" y1="520" x2="260" y2="225" stroke="#555" stroke-width="1.3"/>
  <line x1="92" y1="500" x2="250" y2="335" stroke="#555" stroke-width="1.3"/>

  <!-- ===== Associations: admin ===== -->
  <line x1="858" y1="345" x2="490" y2="130" stroke="#555" stroke-width="1.3"/>
  <line x1="858" y1="355" x2="510" y2="325" stroke="#555" stroke-width="1.3"/>
  <line x1="858" y1="370" x2="620" y2="435" stroke="#555" stroke-width="1.3"/>
  <line x1="858" y1="385" x2="600" y2="535" stroke="#555" stroke-width="1.3"/>

  <!-- ===== Extend relation ===== -->
  <line x1="530" y1="255" x2="450" y2="230" stroke="#555" stroke-width="1.3" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="560" y="230" text-anchor="middle" font-size="11" font-style="italic">&lt;&lt;extend&gt;&gt;</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>
</svg>
